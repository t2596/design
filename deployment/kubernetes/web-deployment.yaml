apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: vehicle-iot-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: web
        image: vehicle-iot-gateway-web:latest
        ports:
        - containerPort: 80
        env:
        # 在 K8s 中，前端通过 Nginx 代理访问后端，使用空字符串（相对路径）
        - name: VITE_API_BASE_URL
          value: ""
        - name: VITE_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: gateway-secrets
              key: API_TOKEN
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: vehicle-iot-gateway
spec:
  selector:
    app: web
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
  type: NodePort
