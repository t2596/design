version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: gateway-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vehicle_iot_gateway}
      POSTGRES_USER: ${POSTGRES_USER:-gateway_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gateway_pass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gateway_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: gateway-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway-network

  # 安全通信网关
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gateway-app
    environment:
      # 数据库配置
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-vehicle_iot_gateway}
      POSTGRES_USER: ${POSTGRES_USER:-gateway_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gateway_pass}
      
      # Redis 配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_pass}
      
      # 安全配置
      CA_PRIVATE_KEY_PATH: ${CA_PRIVATE_KEY_PATH:-/app/keys/ca_private.pem}
      SESSION_TIMEOUT: ${SESSION_TIMEOUT:-3600}
      TIMESTAMP_TOLERANCE: ${TIMESTAMP_TOLERANCE:-300}
      
      # 性能配置
      CACHE_SIZE: ${CACHE_SIZE:-10000}
      CACHE_TTL: ${CACHE_TTL:-300}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./keys:/app/keys:ro
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - gateway-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  gateway-network:
    driver: bridge
