# Redis 配置文件
# 用于车联网安全通信网关系统

# 网络配置
bind 0.0.0.0
port 6379
protected-mode yes

# 安全配置
requirepass change_me_in_production

# 持久化配置
save 900 1
save 300 10
save 60 10000

# 内存配置
maxmemory 2gb
maxmemory-policy allkeys-lru

# 日志配置
loglevel notice
logfile "/var/log/redis/redis.log"

# 数据库数量
databases 16

# 会话数据库索引: 0
# 缓存数据库索引: 1
# Nonce 追踪数据库索引: 2

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128

# 客户端连接
maxclients 10000
timeout 300

# AOF 持久化（可选）
appendonly no
appendfilename "appendonly.aof"
appendfsync everysec
